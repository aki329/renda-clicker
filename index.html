<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>連打ツール</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #1d1d1f;
        background: #f5f5f7;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f5f5f7;
      }

      main {
        width: min(660px, calc(100vw - 28px));
        display: grid;
        gap: 12px;
      }

      .top {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px solid #d2d2d7;
        padding-bottom: 12px;
      }

      h1 {
        margin: 0;
        font-size: 24px;
        line-height: 1.1;
        letter-spacing: 0;
      }

      .status {
        color: #6e6e73;
        font-size: 12px;
        font-weight: 800;
      }

      .actions {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
      }

      .steps {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      a,
      .step {
        border: 1px solid #d2d2d7;
        border-radius: 6px;
        background: #ffffff;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        color: #1d1d1f;
        font-weight: 800;
        text-decoration: none;
      }

      a.primary {
        color: #ffffff;
        background: #1d1d1f;
      }

      .step {
        min-height: 68px;
        padding: 10px;
      }

      .num {
        display: block;
        color: #6e6e73;
        font-size: 11px;
        font-weight: 900;
      }

      .txt {
        display: block;
        margin-top: 6px;
        color: #1d1d1f;
        font-size: 13px;
        line-height: 1.35;
      }

      @media (max-width: 620px) {
        .actions,
        .steps {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header class="top">
        <h1>連打ツール</h1>
        <span class="status">公開サイト対応</span>
      </header>

      <nav class="actions" aria-label="セットアップ">
        <a class="primary" href="./bookmarklet.html">ブックマーク版</a>
        <a href="./chromebook.html">Chromebook用</a>
        <a href="./tests/cps-test.html">テスト</a>
        <a href="./README.md">説明</a>
      </nav>

      <section class="steps" aria-label="手順">
        <div class="step"><span class="num">01</span><span class="txt">公開URLを開く</span></div>
        <div class="step"><span class="num">02</span><span class="txt">コードを保存</span></div>
        <div class="step"><span class="num">03</span><span class="txt">サイトで起動</span></div>
      </section>
    </main>
  </body>
</html>
