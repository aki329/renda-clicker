<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chromebookで使う 連打ツール</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #1d1d1f;
        background: #f5f5f7;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f5f5f7;
      }

      main {
        width: min(820px, calc(100vw - 28px));
        display: grid;
        gap: 14px;
      }

      .top {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px solid #d2d2d7;
        padding-bottom: 12px;
      }

      h1 {
        margin: 0;
        font-size: 24px;
        line-height: 1.1;
        letter-spacing: 0;
      }

      .status {
        color: #6e6e73;
        font-size: 12px;
        font-weight: 900;
      }

      .local-warning {
        display: none;
        border: 1px solid #86868b;
        border-radius: 8px;
        padding: 12px;
        color: #1d1d1f;
        background: #ffffff;
        font-size: 13px;
        font-weight: 800;
        line-height: 1.5;
      }

      body[data-local-page="true"] .local-warning {
        display: block;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
      }

      button {
        min-height: 42px;
        border: 1px solid #1d1d1f;
        border-radius: 6px;
        padding: 0 14px;
        color: #ffffff;
        background: #1d1d1f;
        font: inherit;
        font-weight: 900;
        cursor: pointer;
      }

      button.secondary {
        color: #1d1d1f;
        background: #ffffff;
        border-color: #d2d2d7;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .step,
      .tile,
      .note {
        border: 1px solid #d2d2d7;
        border-radius: 8px;
        padding: 12px;
        background: #ffffff;
      }

      .steps {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .step {
        min-height: 92px;
      }

      .label {
        display: block;
        color: #6e6e73;
        font-size: 11px;
        font-weight: 900;
      }

      .text,
      .step-text {
        display: block;
        margin-top: 6px;
        color: #1d1d1f;
        font-size: 13px;
        line-height: 1.35;
      }

      .step-label {
        display: block;
        color: #1d1d1f;
        font-size: 18px;
        font-weight: 900;
      }

      textarea {
        width: 100%;
        min-height: 126px;
        box-sizing: border-box;
        border: 1px solid #d2d2d7;
        border-radius: 6px;
        padding: 10px;
        color: #1d1d1f;
        background: #ffffff;
        font: 12px/1.35 ui-monospace, SFMono-Regular, Menlo, monospace;
        resize: vertical;
      }

      .code-block {
        display: grid;
        gap: 8px;
      }

      .code-head {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 10px;
      }

      .code-title {
        margin: 0;
        font-size: 14px;
        font-weight: 900;
      }

      .code-note {
        color: #6e6e73;
        font-size: 11px;
        font-weight: 800;
      }

      .mini-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .mini-actions button {
        min-height: 36px;
      }

      .note {
        color: #1d1d1f;
        font-size: 12px;
        line-height: 1.5;
      }

      @media (max-width: 680px) {
        .actions,
        .steps,
        .grid,
        .mini-actions {
          grid-template-columns: 1fr;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header class="top">
        <h1>連打ツール</h1>
        <span class="status">Chromebook用</span>
      </header>

      <p class="local-warning">
        今のURLはMacの中だけです。Chromebookでは、GitHub Pagesなどで公開したURLを開いてください。
      </p>

      <section class="steps" aria-label="使い方">
        <div class="step"><span class="step-label">1. コピー</span><span class="step-text">下のコードをコピー</span></div>
        <div class="step"><span class="step-label">2. 貼る</span><span class="step-text">ブックマークのURL欄へ貼る</span></div>
        <div class="step"><span class="step-label">3. 起動</span><span class="step-text">使うサイトでブックマークを押す</span></div>
      </section>

      <section class="code-block" aria-label="確認コード">
        <div class="code-head">
          <h2 class="code-title">テスト</h2>
          <span class="code-note">先にこれで確認</span>
        </div>
        <div class="mini-actions">
          <button id="copyTestButton" class="secondary" type="button">コピー</button>
          <button id="selectTestButton" class="secondary" type="button">選択</button>
        </div>
        <textarea id="testCode" readonly>読み込み中</textarea>
      </section>

      <section class="code-block" aria-label="通常コード">
        <div class="code-head">
          <h2 class="code-title">連打コード</h2>
          <span class="code-note">基本はこちら</span>
        </div>
        <div class="actions">
          <button id="copyButton" type="button">コピー</button>
          <button id="selectButton" class="secondary" type="button">選択</button>
        </div>
        <textarea id="bookmarkletCode" readonly>読み込み中</textarea>
      </section>

      <section class="code-block" aria-label="短いコード">
        <div class="code-head">
          <h2 class="code-title">短いコード</h2>
          <span class="code-note">公開URLだけ</span>
        </div>
        <div class="mini-actions">
          <button id="copyShortButton" class="secondary" type="button">コピー</button>
          <button id="selectShortButton" class="secondary" type="button">選択</button>
        </div>
        <textarea id="shortCode" readonly>読み込み中</textarea>
      </section>

      <section class="grid" aria-label="メモ">
        <div class="tile"><span class="label">ON/OFF</span><span class="text">設定したキーかEscで停止</span></div>
        <div class="tile"><span class="label">CPS</span><span class="text">1から100まで変更できます</span></div>
        <div class="tile"><span class="label">学校端末</span><span class="text">禁止されている場合は使えません</span></div>
      </section>

      <p id="statusText" class="note">学校で禁止されている場合は使えません。先生か管理者に確認してください。</p>
    </main>

  ctrlKey: event.ctrlKey,\n      metaKey: event.metaKey,\n      shiftKey: event.shiftKey\n    });\n\n    if (!isSafeHotkey(next)) {\n      recordNote.textContent = \"Option/Shift\u3082\u5fc5\u8981\";\n      return;\n    }\n\n    recordingHotkey = false;\n    settings.hotkey = next;\n    saveSettings();\n    recordButton.textContent = \"\u5909\u66f4\";\n    recordNote.hidden = true;\n    render();\n  }\n\n  function setPanelSide(side) {\n    settings.panelSide = side === \"left\" ? \"left\" : \"right\";\n    saveSettings();\n    render();\n  }\n\n  function getClickPoint() {\n    return {\n      x: clamp(Math.round(pointer.x), 0, Math.max(0, window.innerWidth - 1)),\n      y: clamp(Math.round(pointer.y), 0, Math.max(0, window.innerHeight - 1))\n    };\n  }\n\n  function setCps(value) {\n    settings.cps = normalizeCps(value);\n    saveSettings();\n    if (active) {\n      clearTimeout(timerId);\n      timerId = null;\n      nextClickAt = performance.now();\n      runClickLoop();\n    }\n    render();\n  }\n\n  function hidePanel(shouldSave) {\n    root.hidden = true;\n    launcher.hidden = false;\n    settings.panelHidden = true;\n    if (shouldSave !== false) saveSettings();\n    render();\n  }\n\n  function showPanel(shouldSave) {\n    root.hidden = false;\n    launcher.hidden = true;\n    root.dataset.minimized = \"false\";\n    minimizeButton.textContent = \"-\";\n    settings.panelHidden = false;\n    if (shouldSave !== false) saveSettings();\n    render();\n  }\n\n  function startMeasureLoop() {\n    clearInterval(measureTimerId);\n    measureTimerId = window.setInterval(function () {\n      measuredCps = clickCountThisSecond;\n      clickCountThisSecond = 0;\n      render();\n    }, 1000);\n  }\n\n  function updatePointer(event) {\n    pointer = {\n      x: clamp(Math.round(event.clientX), 0, Math.max(0, window.innerWidth - 1)),\n      y: clamp(Math.round(event.clientY), 0, Math.max(0, window.innerHeight - 1))\n    };\n  }\n\n  function render() {\n    root.dataset.active = String(active);\n    root.dataset.side = settings.panelSide;\n    launcher.dataset.side = settings.panelSide;\n    title.textContent = active ? \"\u52d5\u4f5c\u4e2d\" : \"\u505c\u6b62\";\n    cpsInput.value = String(settings.cps);\n    cpsRange.value = String(settings.cps);\n    hotkeyText.textContent = settings.hotkey.label;\n    launcher.textContent = active ? \"\u52d5\u4f5c\u4e2d\" : \"\u8868\u793a\";\n    launcher.dataset.active = String(active);\n  }\n\n  function loadSettings() {\n    try {\n      return normalizeSettings(JSON.parse(localStorage.getItem(STORE_KEY)));\n    } catch (_error) {\n      return normalizeSettings(null);\n    }\n  }\n\n  function saveSettings() {\n    try {\n      localStorage.setItem(STORE_KEY, JSON.stringify(settings));\n    } catch (_error) {\n      // Private browsing or blocked storage: keep the setting for this page only.\n    }\n  }\n\n  function normalizeSettings(value) {\n    return {\n      cps: normalizeCps(value && value.cps),\n      panelHidden: Boolean(value && value.panelHidden),\n      panelSide: value && value.panelSide === \"left\" ? \"left\" : DEFAULTS.panelSide,\n      hotkey: normalizeHotkey(value && value.hotkey)\n    };\n  }\n\n  function normalizeCps(value) {\n    if (value === null || value === undefined || value === \"\") return DEFAULTS.cps;\n    const number = Number(value);\n    if (!Number.isFinite(number)) return DEFAULTS.cps;\n    return Math.min(100, Math.max(1, Math.round(number)));\n  }\n\n  function normalizeHotkey(value) {\n    if (!value || typeof value !== \"object\") return DEFAULTS.hotkey;\n    const key = typeof value.key === \"string\" && value.key ? value.key : DEFAULTS.hotkey.key;\n    const next = {\n      key: key,\n      code: typeof value.code === \"string\" ? value.code : \"\",\n      altKey: Boolean(value.altKey),\n      ctrlKey: Boolean(value.ctrlKey),\n      metaKey: Boolean(value.metaKey),\n      shiftKey: Boolean(value.shiftKey),\n      label: \"\"\n    };\n    next.label = formatHotkey(next);\n    return next;\n  }\n\n  function matchesHotkey(event, hotkey) {\n    return event.altKey === hotkey.altKey\n      && event.ctrlKey === hotkey.ctrlKey\n      && event.metaKey === hotkey.metaKey\n      && event.shiftKey === hotkey.shiftKey\n      && (event.code === hotkey.code || String(event.key || \"\").toLowerCase() === String(hotkey.key || \"\").toLowerCase());\n  }\n\n  function isSafeHotkey(value) {\n    const hasModifier = value.altKey || value.ctrlKey || value.metaKey || value.shiftKey;\n    const isSingleTextKey = value.key.length === 1 && /^[a-z0-9]$/i.test(value.key);\n    return hasModifier || !isSingleTextKey;\n  }\n\n  function formatHotkey(value) {\n    const parts = [];\n    if (value.ctrlKey) parts.push(\"Control\");\n    if (value.altKey) parts.push(\"Option\");\n    if (value.metaKey) parts.push(\"Command\");\n    if (value.shiftKey) parts.push(\"Shift\");\n    parts.push(formatKeyName(value.key || value.code));\n    return parts.join(\"+\");\n  }\n\n  function formatKeyName(key) {\n    if (!key) return \"Key\";\n    if (key === \" \") return \"Space\";\n    if (key.length === 1) return key.toUpperCase();\n    return key.replace(/^Arrow/, \"\");\n  }\n\n  function clamp(value, min, max) {\n    return Math.min(max, Math.max(min, value));\n  }\n\n  function clickCookieClicker(target, point) {\n    let cookie = target.id === \"bigCookie\"\n      ? target\n      : target.closest && target.closest(\"#bigCookie\");\n    if (!cookie) {\n      const candidate = document.getElementById(\"bigCookie\");\n      if (candidate) {\n        const rect = candidate.getBoundingClientRect();\n        const inside = point.x >= rect.left\n          && point.x \u003c= rect.right\n          && point.y >= rect.top\n          && point.y \u003c= rect.bottom;\n        if (inside) cookie = candidate;\n      }\n    }\n    if (!cookie || !window.Game || typeof window.Game.ClickCookie !== \"function\") {\n      return false;\n    }\n\n    try {\n      window.Game.ClickCookie({\n        target: cookie,\n        currentTarget: cookie,\n        clientX: point.x,\n        clientY: point.y,\n        pageX: point.x + window.scrollX,\n        pageY: point.y + window.scrollY,\n        preventDefault: function () {},\n        stopPropagation: function () {}\n      });\n      return true;\n    } catch (_error) {\n      return false;\n    }\n  }\n})();\n"</script>

    <script>
      const textarea = document.getElementById("bookmarkletCode");
      const testCode = document.getElementById("testCode");
      const shortCode = document.getElementById("shortCode");
      const copyButton = document.getElementById("copyButton");
      const selectButton = document.getElementById("selectButton");
      const copyTestButton = document.getElementById("copyTestButton");
      const selectTestButton = document.getElementById("selectTestButton");
      const copyShortButton = document.getElementById("copyShortButton");
      const selectShortButton = document.getElementById("selectShortButton");
      const statusText = document.getElementById("statusText");

      init();

      async function init() {
        document.body.dataset.localPage = String(isLocalPage());
        testCode.value = "javascript:alert('連打ツールのテストOK')";
        try {
          const source = await loadBookmarkletSource();
          textarea.value = "javascript:" + encodeURIComponent(source.trim());
          shortCode.value = isLocalPage() ? "" : buildShortCode();
          copyButton.disabled = false;
          copyShortButton.disabled = !shortCode.value;
          if (isLocalPage()) {
            statusText.textContent = "Chromebookでは公開URLでこのページを開いてください。今は通常コードだけ使えます。";
          } else {
            statusText.textContent = "まずテストを保存して、使うサイトで押してください。OKなら連打コードを使います。";
          }
        } catch (_error) {
          textarea.value = "";
          shortCode.value = "";
          statusText.textContent = "コードを作れませんでした。先生か管理者に確認してください。";
          copyButton.disabled = true;
          copyShortButton.disabled = true;
        }
      }

      async function loadBookmarkletSource() {
        const embedded = document.getElementById("embeddedBookmarkletSource");
        if (embedded && embedded.textContent.trim()) {
          return JSON.parse(embedded.textContent);
        }
        return fetch("./bookmarklet-source.js").then((response) => {
          if (!response.ok) throw new Error("source not found");
          return response.text();
        });
      }

      copyButton.addEventListener("click", async () => {
        await copyCode(textarea, "連打コードをコピーしました。");
      });

      selectButton.addEventListener("click", () => {
        selectCode(textarea, "連打コードを選択しました。");
      });

      copyTestButton.addEventListener("click", async () => {
        await copyCode(testCode, "テストコードをコピーしました。");
      });

      selectTestButton.addEventListener("click", () => {
        selectCode(testCode, "テストコードを選択しました。");
      });

      copyShortButton.addEventListener("click", async () => {
        await copyCode(shortCode, "短いコードをコピーしました。");
      });

      selectShortButton.addEventListener("click", () => {
        selectCode(shortCode, "短いコードを選択しました。");
      });

      async function copyCode(target, message) {
        if (!target.value) return;
        target.select();
        try {
          await navigator.clipboard.writeText(target.value);
          statusText.textContent = message;
        } catch (_error) {
          document.execCommand("copy");
          statusText.textContent = "コピーできない場合は、選択して手動でコピーしてください。";
        }
      }

      function selectCode(target, message) {
        target.focus();
        target.select();
        statusText.textContent = message;
      }

      function buildShortCode() {
        const sourceUrl = new URL("./bookmarklet-source.js", location.href).href;
        return "javascript:(function(){var s=document.createElement('script');s.src='" + sourceUrl.replace(/'/g, "%27") + "?v=' + Date.now();document.documentElement.appendChild(s);})();";
      }

      function isLocalPage() {
        return location.hostname === "localhost"
          || location.hostname === "127.0.0.1"
          || location.protocol === "file:";
      }
    </script>
  </body>
</html>
