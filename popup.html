<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>連打ツール</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="panel">
      <header class="header">
        <div>
          <h1>連打ツール</h1>
          <p id="statusText">読み込み</p>
        </div>
        <span id="statePill" class="pill">停止</span>
      </header>

      <section class="controls" aria-label="連打ツール操作">
        <button id="toggleButton" type="button">開始 / 停止</button>

        <label class="field" for="cpsInput">
          <span>CPS</span>
          <input id="cpsInput" type="number" min="1" max="100" step="1" value="30">
        </label>

        <input id="cpsRange" type="range" min="1" max="100" step="1" value="30">

        <div class="preset-row">
          <button class="secondary-button" type="button" data-cps="10">10</button>
          <button class="secondary-button" type="button" data-cps="30">30</button>
          <button class="secondary-button" type="button" data-cps="60">60</button>
          <button class="secondary-button" type="button" data-cps="100">100</button>
        </div>

        <div class="hotkey-row">
          <div>
            <span class="hotkey-label">キー</span>
            <strong id="hotkeyText">Option+Shift+C</strong>
          </div>
          <button id="recordHotkeyButton" class="secondary-button" type="button">変更</button>
        </div>

        <label class="check-row" for="badgeVisibleInput">
          <span>表示</span>
          <input id="badgeVisibleInput" type="checkbox" checked>
        </label>

        <div class="preset-row two">
          <button id="badgeLeftButton" class="secondary-button" type="button">左下</button>
          <button id="badgeRightButton" class="secondary-button" type="button">右下</button>
        </div>

      </section>

      <p class="note">Escで停止</p>
      <p id="hotkeyNote" class="page-note" hidden></p>
      <p id="pageNote" class="page-note" hidden></p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
