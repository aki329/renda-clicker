<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ブックマーク版 連打ツール</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #1d1d1f;
        background: #f5f5f7;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f5f5f7;
      }

      main {
        width: min(700px, calc(100vw - 28px));
        display: grid;
        gap: 12px;
      }

      .top {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px solid #d2d2d7;
        padding-bottom: 12px;
      }

      h1 {
        margin: 0;
        font-size: 24px;
        line-height: 1.1;
        letter-spacing: 0;
      }

      .status {
        color: #6e6e73;
        font-size: 12px;
        font-weight: 900;
      }

      .bookmarklet {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        border: 1px solid #1d1d1f;
        border-radius: 6px;
        color: #ffffff;
        background: #1d1d1f;
        font-size: 16px;
        font-weight: 900;
        text-decoration: none;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .tile {
        border: 1px solid #d2d2d7;
        border-radius: 6px;
        padding: 10px;
        background: #ffffff;
      }

      .label {
        display: block;
        color: #6e6e73;
        font-size: 11px;
        font-weight: 900;
      }

      .text {
        display: block;
        margin-top: 6px;
        color: #1d1d1f;
        font-size: 13px;
        line-height: 1.35;
      }

      .fallback {
        width: 100%;
        min-height: 86px;
        box-sizing: border-box;
        border: 1px solid #d2d2d7;
        border-radius: 6px;
        padding: 10px;
        color: #1d1d1f;
        background: #ffffff;
        resize: vertical;
      }

      @media (max-width: 640px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header class="top">
        <h1>ブックマーク版</h1>
        <span class="status">バーへドラッグ</span>
      </header>

      <a id="bookmarkletLink" class="bookmarklet" href="#">連打ツール</a>

      <section class="grid" aria-label="手順">
        <div class="tile"><span class="label">保存</span><span class="text">上のボタンをブックマークバーへドラッグ</span></div>
        <div class="tile"><span class="label">起動</span><span class="text">使いたいサイトでブックマークを押す</span></div>
        <div class="tile"><span class="label">停止</span><span class="text">Escで停止</span></div>
      </section>

      <textarea id="bookmarkletCode" class="fallback" readonly></textarea>
    </main>

    <script>
      async function initBookmarklet() {
        const source = await fetch("./bookmarklet-source.js").then((response) => response.text());
        const code = "javascript:" + encodeURIComponent(source.trim());
        const link = document.getElementById("bookmarkletLink");
        const textarea = document.getElementById("bookmarkletCode");
        link.href = code;
        textarea.value = code;
      }

      initBookmarklet().catch(() => {
        document.getElementById("bookmarkletLink").textContent = "サーバー停止中";
      });
    </script>
  </body>
</html>
