<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>連打テスト</title>
    <style>
      :root {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #1d1d1f;
        background: #f5f5f7;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(560px, calc(100vw - 32px));
        display: grid;
        gap: 16px;
      }

      h1 {
        margin: 0;
        font-size: 24px;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: #6e6e73;
        line-height: 1.6;
      }

      #target {
        min-height: 180px;
        border: 1px solid #1d1d1f;
        border-radius: 8px;
        color: #fff;
        background: #1d1d1f;
        font-size: 22px;
        font-weight: 800;
        cursor: pointer;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }

      .stat {
        border: 1px solid #d2d2d7;
        border-radius: 8px;
        padding: 12px;
        background: #fff;
      }

      .label {
        display: block;
        color: #6e6e73;
        font-size: 12px;
      }

      .value {
        display: block;
        margin-top: 4px;
        font-size: 24px;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>連打テスト</h1>
        <p>このボタンにマウスを置いて Option+Shift+C を押します。</p>
      </header>

      <button id="target" type="button">ここを連打テスト</button>

      <section class="stats" aria-label="Click stats">
        <div class="stat">
          <span class="label">合計クリック</span>
          <span id="total" class="value">0</span>
        </div>
        <div class="stat">
          <span class="label">直近1秒</span>
          <span id="lastSecond" class="value">0</span>
        </div>
        <div class="stat">
          <span class="label">最高CPS</span>
          <span id="best" class="value">0</span>
        </div>
      </section>
    </main>

    <script>
      const target = document.getElementById("target");
      const totalEl = document.getElementById("total");
      const lastSecondEl = document.getElementById("lastSecond");
      const bestEl = document.getElementById("best");

      let total = 0;
      let currentSecond = 0;
      let best = 0;

      target.addEventListener("click", () => {
        total += 1;
        currentSecond += 1;
        totalEl.textContent = String(total);
      });

      window.setInterval(() => {
        best = Math.max(best, currentSecond);
        lastSecondEl.textContent = String(currentSecond);
        bestEl.textContent = String(best);
        currentSecond = 0;
      }, 1000);
    </script>
  </body>
</html>
